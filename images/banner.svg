  <path d="M0 300 C 250 210, 400 390, 660 290 S 1120 220, 1600 320" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.65"/>
  <g fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif">
