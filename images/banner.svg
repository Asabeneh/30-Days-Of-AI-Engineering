  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <circle cx="220" cy="90" r="90" fill="#38bdf8" opacity="0.18" filter="url(#blur)"/>
  <circle cx="1330" cy="340" r="130" fill="#f59e0b" opacity="0.14" filter="url(#blur)"/>
