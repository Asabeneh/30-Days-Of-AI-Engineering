    <text x="100" y="200" font-size="30" opacity="0.88">A hands-on, project-first journey from AI fundamentals to production-ready agents</text>
    <text x="100" y="262" font-size="22" opacity="0.78">Python • TypeScript • LLM APIs • RAG • Memory • Agents • MCP • Deployment</text>
